<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Receitas</title>
    <style>
        /* Variáveis de Cor para Tema */
        :root {
            --bg: #fdfaf7;
            --text: #2d3436;
            --card: white;
            --shadow: rgba(0,0,0,0.08);
            --text-passo: #555;
        }

        body.dark {
            --bg: #1a1a1a;
            --text: #fdfaf7;
            --card: #2d3436;
            --shadow: rgba(0,0,0,0.3);
            --text-passo: #dcdde1;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); transition: 0.3s; }
        .tela { display: none; padding: 20px; }
        .ativo { display: block; }
        
        button { 
            background: #28a745; color: white; border: none; padding: 12px 25px; 
            border-radius: 25px; cursor: pointer; font-weight: 600; 
            transition: transform 0.2s, background 0.3s; 
        }
        button:hover { background: #218838; transform: scale(1.05); }

        #campoBusca {
            width: 90%; max-width: 500px; padding: 15px; border-radius: 30px; 
            border: none; box-shadow: 0 4px 15px var(--shadow); 
            display: block; margin: 0 auto 20px auto; outline: none;
            background: var(--card); color: var(--text);
        }

        .img-capa { width: 100%; height: 300px; object-fit: cover; border-radius: 25px; box-shadow: 0 10px 20px var(--shadow); }
        
        .btn-voltar { 
            position: absolute; top: 20px; left: 20px; background: var(--card); 
            padding: 10px 15px; border-radius: 50%; cursor: pointer; font-size: 20px;
            box-shadow: 0 4px 6px var(--shadow); transition: 0.3s; z-index: 10;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 900px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; box-shadow: 0 6px 15px var(--shadow); text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 20px; margin-bottom: 10px; }

        .meta-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .info-box { background: var(--card); padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px var(--shadow); border: 1px solid var(--shadow); }
        .info-box b { display: block; color: #28a745; font-size: 1.1em; margin-top: 5px; }

        h3 { border-left: 4px solid #28a745; padding-left: 10px; }
        
        /* Estilo do Modal de Carregamento */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="telaMenu" class="tela ativo">
    <div style="display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 20px;">
        <h1 style="text-align:center; margin: 0;">Receitas</h1>
        <button id="btn-modo" 
                onclick="document.body.classList.toggle('dark')" 
                style="background: transparent; border: none; color: var(--text); cursor: pointer; font-weight: bold; font-size: 1em; white-space: nowrap; display: flex; align-items: center; gap: 5px;">
            🌓 Alternar Tema
        </button>
    </div>

    <div style="text-align: center; margin-bottom: 10px;">
        <label for="campoBusca" style="font-weight: bold; display: block; margin-bottom: 5px;">Pesquise por Ingrediente</label>
        <input type="text" id="campoBusca" onkeyup="filtrar()" placeholder="Buscar receita...">
    </div>

    <div id="gridReceitas" class="grid"></div>
    <div id="paginacao" style="text-align:center; margin-top:30px;"></div>
</div>

<div id="telaDetalhes" class="tela">
    <div style="position:relative;">
        <div class="btn-voltar" onclick="irParaMenu()">&#8592;</div>
        <img id="d-img" class="img-capa">
    </div>
    <h1 id="d-nome"></h1>
    <div class="meta-info">
        <div class="info-box">⏱️ Tempo<br><b><span id="d-temp"></span></b></div>
        <div class="info-box">🔥 Dif.<br><b><span id="d-dif"></span></b></div>
        <div class="info-box">👥 Porções<br><b><span id="d-porc"></span></b></div>
    </div>
    <h3>Ingredientes</h3>
    <p id="d-ing" style="text-align:justify; line-height:1.6;"></p>
    <h3>Modo de Preparo</h3>
    <div id="d-prep"></div>
</div>

<!-- Modal de Loading -->
<div id="modalLoading" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; align-items: center; justify-content: center; flex-direction: column; color: white;">
    <div style="border: 5px solid #f3f3f3; border-top: 5px solid #28a745; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
    <p style="margin-top: 15px; font-size: 1.2em;">Carregando dados...</p>
</div>

<script>
    let todas = [];
    let paginaAtual = 1;
    const itensPorPagina = 6;
    const URL = "https://script.google.com/macros/s/AKfycbzjQfPDuntZ8wHIu2-VapIVoi6Kf2i4yWzt-vN-9N66iNpal2yuqtJeVtV_rqbPt-wO/exec"; 

    function carregarDados(callback) {
        const modal = document.getElementById('modalLoading');
        modal.style.display = 'flex'; // Mostra o carregamento

        fetch(URL)
            .then(r => r.json())
            .then(data => { 
                todas = data.receitas;
                modal.style.display = 'none'; // Esconde o carregamento
                if (callback) callback();
            })
            .catch(err => {
                modal.style.display = 'none';
                console.error(err);
            });
    }

    carregarDados(() => renderMenu(todas));

    function renderMenu(lista) {
        if (!lista) return;
        const totalPaginas = Math.ceil(lista.length / itensPorPagina);
        const inicio = (paginaAtual - 1) * itensPorPagina;
        const final = inicio + itensPorPagina;
        const exibidas = lista.slice(inicio, final);

        document.getElementById('gridReceitas').innerHTML = exibidas.map(r => `
            <div class="card">
                <img src="${r.imagem}" onerror="this.src='https://via.placeholder.com/200'">
                <h3>${r.nome}</h3>
                <button onclick="abrirDetalhes(${JSON.stringify(r).replace(/"/g, '&quot;')})">Ver Receita</button>
            </div>
        `).join('');

        let pagHtml = '';
        for(let i=1; i<=totalPaginas; i++) {
            pagHtml += `<button style="margin:5px; padding:5px 15px; background:${i === paginaAtual ? '#218838' : '#636e72'}" onclick="mudarPagina(${i})">${i}</button>`;
        }
        document.getElementById('paginacao').innerHTML = pagHtml;
    }

    function mudarPagina(p) { 
        paginaAtual = p; 
        carregarDados(() => {
            filtrar();
            window.scrollTo(0,0);
        });
    }

    function abrirDetalhes(r) {
        document.getElementById('d-img').src = r.imagem;
        document.getElementById('d-nome').innerText = r.nome;
        document.getElementById('d-dif').innerText = r.dificuldade;
        document.getElementById('d-temp').innerText = r.tempo;
        document.getElementById('d-porc').innerText = r.porcoes;
        document.getElementById('d-ing').innerText = r.ingredientes;
        
        const passos = r.preparo ? r.preparo.split('\n') : []; 
        document.getElementById('d-prep').innerHTML = passos.map((passo, index) => `
            <div style="display:flex; align-items:flex-start; background:var(--card); padding:20px; border-radius:20px; margin-bottom:15px; box-shadow:0 5px 15px var(--shadow);">
                <div style="background:linear-gradient(135deg, #28a745, #20c997); color:white; width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-right:15px; flex-shrink:0; font-weight:bold;">${index + 1}</div>
                <div style="line-height:1.6; color:var(--text-passo);">${passo}</div>
            </div>
        `).join('');
        
        document.getElementById('telaMenu').classList.remove('ativo');
        document.getElementById('telaDetalhes').classList.add('ativo');
        window.scrollTo(0,0);
    }

    function irParaMenu() {
        document.getElementById('telaDetalhes').classList.remove('ativo');
        document.getElementById('telaMenu').classList.add('ativo');
        carregarDados(() => filtrar());
    }

    function filtrar() {
        const termo = document.getElementById('campoBusca').value.toLowerCase();
        renderMenu(todas.filter(r => r.nome.toLowerCase().includes(termo)));
    }

    document.body.classList.add('dark');
</script>
</body>
</html>
