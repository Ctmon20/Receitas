<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Receitas - Gratuito</title>
    <style>
        :root {
            --bg: #fdfaf7;
            --card-bg: white;
            --text-main: #2d3436;
            --text-sec: #555;
            --shadow: rgba(0,0,0,0.08);
        }

        body.dark-mode {
            --bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-main: #fdfaf7;
            --text-sec: #dcdde1;
            --shadow: rgba(0,0,0,0.3);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text-main); transition: 0.3s; }
        .tela { display: none; padding: 20px; }
        .ativo { display: block; }
        
        button { 
            background: #28a745; color: white; border: none; padding: 12px 25px; 
            border-radius: 25px; cursor: pointer; font-weight: 600; 
            transition: transform 0.2s, background 0.3s; 
        }
        button:hover { background: #218838; transform: scale(1.05); }

        .img-capa { width: 100%; height: 300px; object-fit: cover; border-radius: 25px; box-shadow: 0 10px 20px var(--shadow); }
        .btn-voltar { 
            position: absolute; top: 20px; left: 20px; background: var(--card-bg); 
            padding: 10px 15px; border-radius: 50%; cursor: pointer; font-size: 20px;
            box-shadow: 0 4px 6px var(--shadow); transition: 0.3s; z-index: 10;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 900px; margin: auto; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 15px; box-shadow: 0 6px 15px var(--shadow); text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 20px; margin-bottom: 10px; }

        .meta-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .info-box { background: var(--card-bg); padding: 15px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px var(--shadow); border: 1px solid var(--shadow); }
        .info-box b { display: block; color: #28a745; font-size: 1.1em; margin-top: 5px; }

        h3 { border-left: 4px solid #28a745; padding-left: 10px; }
        
        
    </style>
</head>
<body>



<div id="telaMenu" class="tela ativo">
    <!-- Container Principal com todos os itens na mesma linha -->
    <div style="display: flex; align-items: center; justify-content: flex-start; gap: 20px; margin-bottom: 20px; padding: 15px 20px; background: #2d2d2d; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
        
        <!-- Título -->
        <h1 style="margin: 0; font-size: 1.5em; color: #ffffff; flex-grow: 1;">Receitas (Gratuito)</h1>
        
        <!-- Botão Tema -->
        <button id="btn-tema" onclick="alternarTema()" style="background: transparent; border: none; color: white; cursor: pointer; font-weight: bold; font-size: 1em; white-space: nowrap;">
            🌙 Tema
        </button>
        
        <!-- Botão Assinar -->
        <a href="index.html" style="background: #28a745; color: white; padding: 8px 18px; border-radius: 20px; text-decoration: none; font-weight: 600; font-size: 0.9em; white-space: nowrap;">
            Assinar Agora
        </a>
            
    </div>
    
    <div id="gridReceitas" class="grid"></div>
</div>

<div id="telaDetalhes" class="tela">
    <div style="position:relative;">
        <div class="btn-voltar" onclick="irParaMenu()">&#8592;</div>
        <img id="d-img" class="img-capa">
    </div>
    <h1 id="d-nome"></h1>
    <div class="meta-info">
        <div class="info-box">⏱️ Tempo<br><b><span id="d-temp"></span></b></div>
        <div class="info-box">🔥 Dificuldade.<br><b><span id="d-dif"></span></b></div>
        <div class="info-box">👥 Porções<br><b><span id="d-porc"></span></b></div>
    </div>
    <h3>Ingredientes</h3>
    <p id="d-ing" style="text-align:justify; line-height:1.6; color: var(--text-sec);"></p>
    <h3>Modo de Preparo</h3>
    <div id="d-prep"></div>
</div>

<script>
    function alternarTema() {
        document.body.classList.toggle('dark-mode');
    }

    const URL = "https://script.google.com/macros/s/AKfycbzjQfPDuntZ8wHIu2-VapIVoi6Kf2i4yWzt-vN-9N66iNpal2yuqtJeVtV_rqbPt-wO/exec";

    fetch(URL)
        .then(r => r.json())
        .then(data => {
            const lista = data.receitas || []; 
            const limitadas = lista.slice(0, 6);
            renderMenu(limitadas);
        });

    function renderMenu(lista) {
        document.getElementById('gridReceitas').innerHTML = lista.map(r => `
            <div class="card">
                <img src="${r.imagem}" onerror="this.src='https://via.placeholder.com/200'">
                <h3 style="color:var(--text-main)">${r.nome}</h3>
                <button onclick="abrirDetalhes(${JSON.stringify(r).replace(/"/g, '&quot;')})">Ver Receita</button>
            </div>
        `).join('');
    }

    function abrirDetalhes(r) {
        document.getElementById('d-img').src = r.imagem;
        document.getElementById('d-nome').innerText = r.nome;
        document.getElementById('d-dif').innerText = r.dificuldade;
        document.getElementById('d-temp').innerText = r.tempo;
        document.getElementById('d-porc').innerText = r.porcoes;
        document.getElementById('d-ing').innerText = r.ingredientes;
        
        const passos = r.preparo.split('\n'); 
        document.getElementById('d-prep').innerHTML = passos.map((passo, index) => `
            <div style="display:flex; align-items:flex-start; background:var(--card-bg); padding:20px; border-radius:20px; margin-bottom:15px; box-shadow:0 5px 15px var(--shadow);">
                <div style="background:#28a745; color:white; width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-right:15px; flex-shrink:0; font-weight:bold;">${index + 1}</div>
                <div style="line-height:1.6; color:var(--text-sec);">${passo}</div>
            </div>
        `).join('');
        
        document.getElementById('telaMenu').classList.remove('ativo');
        document.getElementById('telaDetalhes').classList.add('ativo');
        window.scrollTo(0,0);
    }

    function irParaMenu() {
        document.getElementById('telaDetalhes').classList.remove('ativo');
        document.getElementById('telaMenu').classList.add('ativo');
    }

// Força a ativação do modo escuro ao carregar
document.body.classList.add('dark-mode');

</script>
</body>
</html>
